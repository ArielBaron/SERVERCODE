<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body{
            font: 1.15em sans-serif;
            background-color: beige
        }
        .eqution-container{
            font: 1em sans-serif;
            text-align: left;
            margin-left: 300px;
            margin-right: 300px;
            padding-left: 10px;
            padding-bottom: 10px;
            background-color: orange;
            border: 4px black solid;
            height: 85px;
        }
        .grid-container{
            display: grid;
            grid-template-columns: repeat(4, 100px);
            gap: 10px;
            margin: 20px auto;
            width: 300px;
        }
        .additional-buttons{
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            margin: 20px auto;
            width: 300px;
            float: left;
        }

        .grid-item{
            padding: 30px;
            text-align: center;
            background-color: orange;
            border: none;
            cursor: pointer;
            font-size: 2em;
        }
        .grid-item:hover{
            background-color: rgb(178, 90, 22)
        }
        .title{
            font: 0.75em;
        }
    </style>
</head>
<body>
    <h1 class="Title" id="Time">Welcome to my calculator</h1>
    <div class="eqution-container">
        <h1 id="eq"></h1>
    </div>
    <div class="calculator-container">
        <div class="additional-buttons">
            <button class="grid-item">e</button>
            <button class="grid-item">π</button>
            <button class="grid-item">^</button>
            <button class="grid-item">√</button>
            <button class="grid-item">log </button>
            <button class="grid-item">sin </button>
            <button class="grid-item">cos </button>
            <button class="grid-item">in </button>
            <button class="grid-item">tan </button>
        </div>
        <div class="grid-container">
            <button class="grid-item" id="C">C</button>
            <button class="grid-item" id="0">0</button>
            <button class="grid-item" id="1">1</button>
            <button class="grid-item" id="2">2</button>
            <button class="grid-item" id="3">3</button>
            <button class="grid-item" id="4">4</button>
            <button class="grid-item" id="5">5</button>
            <button class="grid-item" id="6">6</button>
            <button class="grid-item" id="7">7</button>
            <button class="grid-item" id="8">8</button>
            <button class="grid-item" id="9">9</button>
            <button class="grid-item" id="+">+</button>
            <button class="grid-item" id="-">-</button>
            <button class="grid-item" id="x">x</button>
            <button class="grid-item" id="÷">÷</button>
            <button class="grid-item"  id="=">=</button>
        </div>
    </div>
    <script>
        const EqutionLabel = document.getElementById("eq");
        const grid_items = document.getElementsByClassName("grid-item");
        const btnE = document.getElementById("=");
        const btnC = document.getElementById("C");
        const title = document.getElementById("Time")
        let hasSyntaxError = false;

        const UpdateTime = () => {
            const DateObject = new Date()
            let Am_Pm =  DateObject.getHours() > 12 ? "PM":"AM"
            let hour = DateObject.getHours()-12 > 12 ? DateObject.getHours()-12:DateObject.getHours()
            title.textContent = `The time is: ${hour}:${DateObject.getMinutes()} ${Am_Pm}`
        }
        const update_title = setInterval(UpdateTime,1000)

        for (let i = 0; i < grid_items.length; i++) {
            if (grid_items[i].textContent !== btnE.textContent && grid_items[i].textContent !== btnC.textContent) {
                grid_items[i].onclick = () => {
                    if (hasSyntaxError) {
                        EqutionLabel.textContent = "";
                        hasSyntaxError = false;
                    }
                    EqutionLabel.textContent += grid_items[i].textContent;

                };
            }
        }

        btnC.onclick = () => {
            EqutionLabel.textContent = "";
            hasSyntaxError = false;
        };

        btnE.onclick = () => {
            console.log("Expression:", EqutionLabel.textContent);
            let Equation = EqutionLabel.textContent;

            let correctedEquation = "";
            for (let i = 0; i < Equation.length; i++) {
                if (i < Equation.length - 1 && "eπ√".includes(Equation[i + 1]) && "0123456789eπ".includes(Equation[i])) {
                    correctedEquation += Equation[i] + "*";
                } else {
                    correctedEquation += Equation[i];
                }
            }

            let i = 0;
            let correctedSqrtEquation = "";
            while (i < correctedEquation.length) {
                if ("√".includes(correctedEquation[i])) {
                    let number = "";
                    i++;
                    while (i < correctedEquation.length && "0123456789.e".includes(correctedEquation[i])) {
                        number += correctedEquation[i];
                        i++;
                    }
                    correctedSqrtEquation += "Math.sqrt(" + number + ")";
                } else {
                    correctedSqrtEquation += correctedEquation[i];
                    i++;
                }
            }

            let result = correctedSqrtEquation.replace(/x/g, "*").replace(/÷/g, "/").replace(/π/g, "Math.PI").replace(/e/g, "Math.E");
            result = result.replace(/\^/g, "**");

            console.log(result);
            try {
                result = eval(result);
                EqutionLabel.textContent = result;
            } catch (error) {
                EqutionLabel.textContent = "Syntax Error";
                hasSyntaxError = true;
            }
        };
    </script>
</body>
</html>
